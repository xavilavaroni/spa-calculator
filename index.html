<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Compensación</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #161616;
            --text-main: #e0e0e0;
            --accent-green: #00ff41;
            --border-color: #333;
        }

        * { box-sizing: border-box; }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }

        .container { background-color: var(--panel-bg); padding: 24px 20px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; max-width: 350px; text-align: center; }

        h2 { font-size: 1.1rem; text-transform: uppercase; margin: 0 0 10px; }

        /* Toggle */
        .toggle-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; }
        .toggle-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; }
        .toggle-label.active { color: var(--accent-green); font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; border: 1px solid var(--accent-green); border-radius: 26px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--accent-green); border-radius: 50%; transition: 0.3s; }
        input:checked + .slider:before { transform: translateX(22px); }

        .scale-badge { display: inline-block; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--accent-green); color: var(--accent-green); margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }

        /* Fields */
        .fields-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 4px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 4px; }

        .field-display {
            width: 100%;
            padding: 8px 4px;
            background-color: #000;
            border: 1px solid #444;
            color: #aaa;
            font-size: 1.1rem;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            user-select: none;
            min-height: 42px;
            line-height: 1.6;
        }
        .field-display.focused {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        /* Numpad */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
        .np-btn {
            padding: 14px 0;
            background-color: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        .np-btn:active { background-color: #333; }
        .np-btn.special { color: var(--accent-green); font-size: 0.9rem; }
        .np-btn.calc-btn {
            background-color: var(--accent-green);
            color: #000;
            border-color: var(--accent-green);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        .np-btn.calc-btn:active { background-color: #00cc33; }
        .np-btn.btn-red { color: #ff3333; border-color: #ff3333; }
        .np-btn.btn-red.full-row { background-color: #3a0000; color: #ff4444; border-color: #ff3333; }
        .np-btn.btn-red.full-row:active { background-color: #5a0000; }
        .np-btn.full-row { grid-column: span 3; }

        .result-display { margin: 14px 0 8px; font-size: 2rem; font-weight: bold; color: var(--accent-green); }

        .history-section { margin-top: 14px; border-top: 1px solid #222; padding-top: 10px; font-size: 0.8rem; color: #666; }
        .history-section li { padding: 2px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Calculadora SPA</h2>

    <div class="toggle-wrapper">
        <span class="toggle-label active" id="label-a">Alemania</span>
        <label class="switch">
            <input type="checkbox" id="scaleToggle" onchange="onToggle()">
            <span class="slider"></span>
        </label>
        <span class="toggle-label" id="label-b">USA</span>
    </div>

    <div class="fields-row">
        <div class="input-group">
            <label>Distancia (m)</label>
            <div class="field-display focused" id="disp-m" onclick="setFocus('m')">--</div>
        </div>
        <div class="input-group">
            <label>Comp. (MIL)</label>
            <div class="field-display" id="disp-comp" onclick="setFocus('comp')">0</div>
        </div>
    </div>

    <div class="numpad">
        <button class="np-btn" onclick="pad('7')">7</button>
        <button class="np-btn" onclick="pad('8')">8</button>
        <button class="np-btn" onclick="pad('9')">9</button>
        <button class="np-btn" onclick="pad('4')">4</button>
        <button class="np-btn" onclick="pad('5')">5</button>
        <button class="np-btn" onclick="pad('6')">6</button>
        <button class="np-btn" onclick="pad('1')">1</button>
        <button class="np-btn" onclick="pad('2')">2</button>
        <button class="np-btn" onclick="pad('3')">3</button>
        <button class="np-btn special" onclick="pad('+/-')">+/-</button>
        <button class="np-btn" onclick="pad('0')">0</button>
        <button class="np-btn btn-red" onclick="pad('bk')">⌫</button>
        <button class="np-btn btn-red full-row" onclick="pad('C')">Borrar</button>
        <button class="np-btn calc-btn full-row" onclick="calcular()">CALC</button>
    </div>

    <div class="result-display" id="resultDisplay">-- MIL</div>

    <div class="history-section">
        <ul id="history-list" style="list-style:none; padding:0; margin:0;"></ul>
    </div>
</div>

<script>
    const scaleA = [
        { m: 200, mil: 100 }, { m: 220, mil: 117 }, { m: 240, mil: 135 },
        { m: 260, mil: 153 }, { m: 280, mil: 171 }, { m: 300, mil: 188 },
        { m: 320, mil: 206 }, { m: 340, mil: 224 }, { m: 360, mil: 242 },
        { m: 380, mil: 260 }, { m: 400, mil: 277 }, { m: 420, mil: 295 },
        { m: 440, mil: 313 }, { m: 460, mil: 331 }, { m: 480, mil: 348 },
        { m: 500, mil: 366 }
    ];

    const scaleB = [
        { m: 200, mil: 100 }, { m: 225, mil: 116 }, { m: 250, mil: 133 },
        { m: 275, mil: 150 }, { m: 300, mil: 166 }, { m: 325, mil: 183 },
        { m: 350, mil: 200 }, { m: 375, mil: 216 }, { m: 400, mil: 233 },
        { m: 425, mil: 250 }, { m: 450, mil: 266 }, { m: 475, mil: 283 },
        { m: 500, mil: 300 }, { m: 525, mil: 316 }, { m: 550, mil: 333 },
        { m: 575, mil: 350 }, { m: 600, mil: 366 }
    ];

    let history = [];
    let useScaleB = false;
    let focusedField = 'm';
    let values = { m: '', comp: '0' };

    function setFocus(field) {
        focusedField = field;
        document.getElementById('disp-m').classList.toggle('focused', field === 'm');
        document.getElementById('disp-comp').classList.toggle('focused', field === 'comp');
    }

    function updateDisplays() {
        document.getElementById('disp-m').textContent = values.m === '' ? '--' : values.m;
        document.getElementById('disp-comp').textContent = values.comp === '' ? '0' : values.comp;
    }

    function pad(key) {
        let v = values[focusedField];

        if (key === 'C') {
            values[focusedField] = focusedField === 'comp' ? '0' : '';
        } else if (key === 'bk') {
            v = v.slice(0, -1);
            if (v === '' || v === '-') v = focusedField === 'comp' ? '0' : '';
            values[focusedField] = v;
        } else if (key === '+/-') {
            if (v === '' || v === '0') return;
            values[focusedField] = v.startsWith('-') ? v.slice(1) : '-' + v;
        } else if (key === '.') {
            if (!v.includes('.')) values[focusedField] = (v === '' ? '0' : v) + '.';
        } else {
            if (v === '0' && key !== '.') v = '';
            values[focusedField] = v + key;
        }

        updateDisplays();

        // Auto-focus comp after 3 digits in distance field
        if (focusedField === 'm' && values.m.replace('-', '').length === 3) {
            setFocus('comp');
        }
    }

    function onToggle() {
        useScaleB = document.getElementById('scaleToggle').checked;
        document.getElementById('label-a').classList.toggle('active', !useScaleB);
        document.getElementById('label-b').classList.toggle('active', useScaleB);
        document.getElementById('resultDisplay').innerText = '-- MIL';
    }

    function interpolate(m, p1, p2) {
        const slope = (p2.mil - p1.mil) / (p2.m - p1.m);
        return p1.mil + (m - p1.m) * slope;
    }

    function getMil(m, scale) {
        if (m <= scale[0].m) return interpolate(m, scale[0], scale[1]);
        if (m >= scale[scale.length - 1].m) return interpolate(m, scale[scale.length - 2], scale[scale.length - 1]);
        for (let i = 0; i < scale.length - 1; i++) {
            if (m >= scale[i].m && m <= scale[i + 1].m) return interpolate(m, scale[i], scale[i + 1]);
        }
    }

    function calcular() {
        const m = parseFloat(values.m);
        if (isNaN(m)) { alert("Ingresa una distancia"); return; }

        const comp = parseFloat(values.comp || 0);
        let finalMil, histLabel;

        if (useScaleB) {
            finalMil = Math.round(getMil(m, scaleB) + (comp * -1));
            histLabel = `[USA] ${m}m comp:${comp} = ${finalMil} MIL`;
        } else {
            finalMil = Math.round(getMil(m, scaleA) + (comp * -1) - 15);
            histLabel = `[ALE] ${m}m comp:${comp} = ${finalMil} MIL`;
        }

        document.getElementById('resultDisplay').innerText = `${finalMil} MIL`;
        history.unshift(histLabel);
        if (history.length > 10) history.pop();
        document.getElementById('history-list').innerHTML = history.map(h => `<li>${h}</li>`).join('');

        // Reset for next shot
        values.m = '';
        values.comp = '0';
        updateDisplays();
        setFocus('m');
    }
</script>
</body>
</html>
